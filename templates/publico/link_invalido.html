<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Inválido - Cámara de Comercio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center">
    <div class="text-center">
        <div class="w-24 h-24 rounded-full bg-red-100 flex items-center justify-center mx-auto mb-6">
            <i class="fas fa-link text-4xl text-red-500"></i>
        </div>
        <h1 class="text-3xl font-bold text-gray-800 mb-4">Link Inválido o Expirado</h1>
        <p class="text-gray-500 mb-8">El enlace al que intentó acceder no existe o ha expirado.</p>
        <a href="/" class="inline-flex items-center gap-2 px-6 py-3 bg-primary-600 text-white rounded-xl hover:bg-primary-700 transition">
            <i class="fas fa-home"></i> Volver al Inicio
        </a>
    </div>
</body>
</html>
